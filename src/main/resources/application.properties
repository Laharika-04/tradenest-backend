# ── Server ────────────────────────────────────────────────────────────────────
server.port=9000

# ── PostgreSQL (Supabase) ────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://db.xntjqaohdbekoeilvuyt.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=Abhiram@2009
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── File Upload ───────────────────────────────────────────────────────────────
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

# ── JWT ───────────────────────────────────────────────────────────────────────
# Secret must be at least 32 characters for HS256
app.jwt.secret=tradenest-super-secret-key-minimum-32-chars-long
app.jwt.expiration-ms=86400000

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.tradenest=INFO
logging.level.org.springframework.security=WARN