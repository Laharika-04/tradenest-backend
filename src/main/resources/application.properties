# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:9000}

# ── PostgreSQL (Supabase Direct Connection) ───────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db.xntjqaohdbekoeilvuyt.supabase.co:5432/postgres?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP ──────────────────────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.defer-datasource-initialization=true

# ── File Upload ───────────────────────────────────────────────────────────────
app.upload.dir=${UPLOAD_DIR:/tmp/tradenest-uploads}
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:tradenest-super-secret-key-minimum-32-chars-long}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.tradenest=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN